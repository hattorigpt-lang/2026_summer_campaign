<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>One For All All For One キャンペーン in 沖縄 - 進捗マップ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght=400;600;700;800;900&family=Noto+Sans+JP:wght=400;500;700;900&display=swap');
        
        html, body {
            font-family: 'Noto Sans JP', 'Montserrat', sans-serif;
            background: #0ea5e9;
            color: #1e293b;
            overflow: hidden !important;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            margin: 0; padding: 0;
        }

        .ocean-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 40%, #2dd4bf 100%) !important;
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;
        }

        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .ring-spin-cyan::before {
            content: ''; position: absolute; inset: -2px; border-radius: 50%;
            background: conic-gradient(from 0deg, #06b6d4, #22d3ee, transparent, #06b6d4);
            animation: rotate-gradient 3s linear infinite; z-index: -1;
        }
        .ring-spin-gold::before {
            content: ''; position: absolute; inset: -2px; border-radius: 50%;
            background: conic-gradient(from 0deg, #eab308, #fef08a, #facc15, transparent, #eab308);
            animation: rotate-gradient 2s linear infinite; z-index: -1;
        }

        @keyframes float-gentle {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(0.5deg); }
        }
        .float-animation { animation: float-gentle 3.5s infinite ease-in-out; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        #map-svg {
            cursor: grab;
            touch-action: none;
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;
        }
        #map-svg:active {
            cursor: grabbing;
        }

        /* SVG内の全アイコン共通の超滑らかな移動イージング設定 */
        .svg-avatar-node, .svg-dept-node, .svg-branch-node {
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 外出しのHTMLツールチップをホバー時に美しく見せる */
        .tooltip-box {
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -100%) scale(0.95);
            transition: opacity 0.2s, transform 0.2s;
        }
        .tooltip-box.show {
            opacity: 1;
            transform: translate(-50%, -115%) scale(1);
        }
    </style>
</head>

        const BRANCH_SINGLE_BUDGET = 22400000; 
        const MEDICAL_TARGETS = { june: 3.0, july: 3.0, total: 6.0 };

            { id: "1009", name: "久松", department: "1", role: "FA",  kp_june: 440000, kp_july: 420000, med_june: 3.0, med_july: 3.5, image_url: "" },
            { id: "1010", name: "風間", department: "1", role: "FA",  kp_june: 280000, kp_july: 300000, med_june: 1.5, med_july: 1.5, image_url: "" },

            { id: "2001", name: "鈴木", department: "2", role: "Mgr", kp_june: 420000, kp_july: 410000, med_june: 3.0, med_july: 3.0, image_url: "" },

            { id: "4004", name: "黒子", department: "4", role: "FA",  kp_june: 450000, kp_july: 500000, med_june: 1.5, med_july: 2.0, image_url: "" },

            { id: "5001", name: "河野", department: "5", role: "Mgr", kp_june: 430000, kp_july: 440000, med_june: 3.5, med_july: 3.0, image_url: "" },
            { id: "5002", name: "太田", department: "5", role: "FA",  kp_june: 400000, kp_july: 410000, med_june: 2.5, med_july: 2.0, image_url: "" }
        ];

        let members = [];
        let currentMode = 'june';
        let isSmoothTransitionActive = true; // アニメーションをデフォルトで常時有効化

        let camX = 0; let camY = 0; let camW = 1200; let camH = 740;
        let isDragging = false; let dragStartX = 0; let dragStartY = 0;
        let startTouchDistance = 0; let startCamW = 1200; let startCamH = 740;

        window.addEventListener('DOMContentLoaded', () => {
            loadSavedData();
            lucide.createIcons();
            initManualCameraEvents();
            applyCamera();
            renderMap();
            renderEditForm();
            updateSummaryStats();
            window.addEventListener('resize', renderMap);
        });

        function loadSavedData() {
            const saved = localStorage.getItem('campaign_sales_data_v3');
            if (saved) {
                try { members = JSON.parse(saved); } catch(e) { members = [...INITIAL_DEMO_DATA]; }
            } else { members = [...INITIAL_DEMO_DATA]; }
        }

        function saveData() { localStorage.setItem('campaign_sales_data_v3', JSON.stringify(members)); }

        function resetToDemo() {
            if (confirm('データを初期のデモデータにリセットしますか？')) {
                members = JSON.parse(JSON.stringify(INITIAL_DEMO_DATA));
                saveData(); 
                renderMap(); renderEditForm(); updateSummaryStats();
                showToast('デモデータを読み込みました', 'info');
            }
        }

        function saveAndApply() {
            members.forEach(m => {
                const kpJuneInput = document.getElementById(`edit-kp-june-${m.id}`);
                const kpJulyInput = document.getElementById(`edit-kp-july-${m.id}`);
                const medJuneInput = document.getElementById(`edit-med-june-${m.id}`);
                const medJulyInput = document.getElementById(`edit-med-july-${m.id}`);

                if (kpJuneInput) m.kp_june = (parseFloat(kpJuneInput.value) || 0) * 10000;
                if (kpJulyInput) m.kp_july = (parseFloat(kpJulyInput.value) || 0) * 10000;
                if (medJuneInput) m.med_june = parseFloat(medJuneInput.value) || 0;
                if (medJulyInput) m.med_july = parseFloat(medJulyInput.value) || 0;
            });
            saveData(); 
            renderMap();
            updateSummaryStats();
            toggleDrawer();
            showToast('データを保存・マップへ反映しました！⛵', 'success');
        }

        function changeMode(mode) {
            currentMode = mode;
            ['june', 'july', 'total'].forEach(m => {
                const btn = document.getElementById(`btn-mode-${m}`);
                btn.className = m === mode 
                    ? "px-2 py-1 md:px-4 md:py-1.5 rounded-lg text-[10px] md:text-xs font-black transition-all duration-300 bg-gradient-to-r from-cyan-500 to-teal-500 text-white shadow"
                    : "px-2 py-1 md:px-4 md:py-1.5 rounded-lg text-[10px] md:text-xs font-black transition-all duration-300 text-slate-600 hover:text-slate-900";
            });
            renderMap();
            updateSummaryStats();
            showToast(`${mode === 'june' ? '6月度' : mode === 'july' ? '7月度' : '連月トータル'}の数値を展開します`, 'info');
        }

        function getMemberTarget(member, mode = currentMode) {
            const config = DEPT_CONFIGS[member.department];
            if (!config) return 1000000;
            const singleTarget = config.j_target / config.count;
            return mode === 'total' ? singleTarget * 2 : singleTarget;
        }

        function getMemberProgress(member, mode = currentMode) {
            const target = getMemberTarget(member, mode);
            let currentKP = mode === 'june' ? member.kp_june : mode === 'july' ? member.kp_july : member.kp_june + member.kp_july;
            return Math.min((currentKP / target) * 100, 100);
        }

        function getMedicalLevel(member, mode = currentMode) {
            const target = MEDICAL_TARGETS[mode];
            let currentMed = mode === 'june' ? member.med_june : mode === 'july' ? member.med_july : member.med_june + member.med_july;
            if (currentMed >= target) return 3;       
            if (currentMed >= (target / 2)) return 2; 
            return 1;
        }

        function getBranchProgress(mode = currentMode) {
            const totalTarget = mode === 'total' ? BRANCH_SINGLE_BUDGET * 2 : BRANCH_SINGLE_BUDGET;
            let totalKP = 0; 
            members.forEach(m => { totalKP += mode === 'june' ? m.kp_june : mode === 'july' ? m.kp_july : (m.kp_june + m.kp_july); });
            return (totalKP / totalTarget) * 100;
        }

        function getDeptProgress(dept, mode = currentMode) {
            const config = DEPT_CONFIGS[dept];
            if (!config) return 0;
            const deptTarget = mode === 'total' ? config.j_target * 2 : config.j_target;
            let totalKP = 0; 
            members.filter(m => m.department === String(dept)).forEach(m => { totalKP += mode === 'june' ? m.kp_june : mode === 'july' ? m.kp_july : (m.kp_june + m.kp_july); });
            return (totalKP / deptTarget) * 100;
        }

        // SVG内のPathからネイティブな内部XY座標を直接引っ張る（ズームバグの完全な根治治療）
        function getRawPointOnPath(pathId, progressPct) {
            const path = document.getElementById(pathId);
            if (!path) return { x: 0, y: 0 };
            const totalLength = path.getTotalLength();
            return path.getPointAtLength(totalLength * (progressPct / 100));
        }

        function initManualCameraEvents() {
            const svg = document.getElementById('map-svg'); if (!svg) return;
            const startDrag = (e) => {
                if (e.touches && e.touches.length === 2) {
                    isDragging = false;
                    startTouchDistance = Math.sqrt(Math.pow(e.touches[1].clientX - e.touches[0].clientX, 2) + Math.pow(e.touches[1].clientY - e.touches[0].clientY, 2));
                    startCamW = camW; startCamH = camH;
                } else {
                    isDragging = true;
                    dragStartX = e.touches ? e.touches[0].clientX : e.clientX;
                    dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
                }
            };
            const doDrag = (e) => {
                const rect = svg.getBoundingClientRect();
                if (e.touches && e.touches.length === 2) {
                    e.preventDefault(); if (startTouchDistance === 0) return;
                    const currentDistance = Math.sqrt(Math.pow(e.touches[1].clientX - e.touches[0].clientX, 2) + Math.pow(e.touches[1].clientY - e.touches[0].clientY, 2));
                    const ratio = startTouchDistance / (currentDistance || 1);
                    if (startCamW * ratio < 150 || startCamW * ratio > 4000) return;
                    const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                    const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                    const scale = Math.max(rect.width / camW, rect.height / camH);
                    const svgCenterX = camX + (camW - rect.width / scale) / 2 + centerX / scale;
                    const svgCenterY = camY + (camH - rect.height / scale) / 2 + centerY / scale;
                    camW = startCamW * ratio; camH = startCamH * ratio;
                    const newScale = Math.max(rect.width / camW, rect.height / camH);
                    camX = svgCenterX - centerX / newScale - (camW - rect.width / newScale) / 2;
                    camY = svgCenterY - centerY / newScale - (camH - rect.height / newScale) / 2;
                    applyCamera(); return;
                }
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scale = Math.max(rect.width / camW, rect.height / camH);
                camX -= (clientX - dragStartX) / scale; camY -= (clientY - dragStartY) / scale;
                dragStartX = clientX; dragStartY = clientY;
                applyCamera();
            };
            svg.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', doDrag);
            window.addEventListener('mouseup', () => isDragging = false);
            svg.addEventListener('touchstart', startDrag, { passive: false });
            window.addEventListener('touchmove', doDrag, { passive: false });
            window.addEventListener('touchend', () => { isDragging = false; startTouchDistance = 0; });
        }

        // 重なりまくるアバターを綺麗に散らすための「花びら等間隔分散ロジック」
        function getSpreadOffset(index, total) {
            if (total <= 1) return { dx: 0, dy: 0 };
            const radius = 24; // 分散させる半径の幅
            const angle = (index * (2 * Math.PI / total)) + (index * 0.2); // 重なり防止の微小な回転
            return {
                dx: Math.cos(angle) * radius,
                dy: Math.sin(angle) * radius
            };
        }

        function handleCSVImport(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = parseCSV(e.target.result);
                    if (parsedData && parsedData.length > 0) { members = parsedData; saveData(); renderMap(); renderEditForm(); updateSummaryStats(); showToast('CSVデータを正常にインポートしました 🌴', 'success'); }
                } catch (err) { showToast(`エラー: ${err.message}`, 'error'); }
            };
            reader.readAsText(file, 'UTF-8'); event.target.value = '';
        }

        function parseCSV(text) {
            const lines = text.split(/\r\n|\n/); if (lines.length < 2) throw new Error('CSVファイルが正しくありません。');
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '')); const results = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim(); if (!line) continue;
                const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, '')); const rowObj = {}; headers.forEach((h, idx) => { rowObj[h] = values[idx] || ''; });
                results.push({ id: String(rowObj.id), name: String(rowObj.name), department: String(rowObj.department), role: String(rowObj.role), kp_june: parseFloat(rowObj.kp_june) || 0, kp_july: parseFloat(rowObj.kp_july) || 0, med_june: parseFloat(rowObj.med_june) || 0, med_july: parseFloat(rowObj.med_july) || 0, image_url: rowObj.image_url || '' });
            }
            return results;
        }

        function exportToCSV() {
            if (members.length === 0) return;
            const headers = ['id', 'name', 'department', 'role', 'kp_june', 'kp_july', 'med_june', 'med_july', 'image_url']; const csvRows = [headers.join(',')];
            members.forEach(m => { csvRows.push([m.id, `"${m.name}"`, m.department, m.role, m.kp_june, m.kp_july, m.med_june, m.med_july, `"${m.image_url || ''}"`].join(',')); });
            const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.setAttribute("download", `campaign_sales_data_${currentMode}.csv`); link.click();
            showToast('最新データをエクスポートしました 🏄‍♂️', 'success');
        }

            const container = document.getElementById('toast-container'); if (!container) return;
            const toast = document.createElement('div'); toast.className = 'toast-active flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-black pointer-events-auto shadow-xl';
            const colors = { success: 'bg-emerald-50 border border-emerald-200 text-emerald-700', warning: 'bg-amber-50 border border-amber-200 text-amber-700', error: 'bg-rose-50 border border-rose-200 text-rose-700', info: 'bg-white border border-slate-200 text-slate-700' };
            const icons = { success: 'check-circle', warning: 'alert-triangle', error: 'alert-octagon', info: 'info' };
            toast.className += ` ${colors[type] || colors.info}`;
            toast.innerHTML = `<i data-lucide="${icons[type] || icons.info}" class="w-4 h-4 flex-shrink-0"></i><div class="flex-1">${message}</div>`;
            container.appendChild(toast); lucide.createIcons();
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }
    </script>
</body>
</html>
